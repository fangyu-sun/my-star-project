<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Celestial Locator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0b0c10;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f0f8ff;
            --text-muted: #a9b0ba;
            --accent: #45f3ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Starry Background Animation */
        .stars {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        }
        
        .stars::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, #ddd, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 5s infinite linear;
            opacity: 0.5;
        }

        @keyframes twinkle {
            0% { transform: translateY(0); }
            100% { transform: translateY(-200px); }
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            background: -webkit-linear-gradient(45deg, var(--text-main), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 300;
        }

        button {
            background: rgba(69, 243, 255, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background: var(--accent);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--accent);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .result-card {
            margin-top: 30px;
            text-align: left;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 20px;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-item {
            margin-bottom: 15px;
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .result-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .result-value {
            font-size: 18px;
            font-weight: 400;
            color: var(--text-main);
        }

        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(69, 243, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
            margin: 20px auto 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-msg {
            color: #ff6b6b;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    
    <div class="container">
        <h1>🌟 头顶星空定位器</h1>
        <p class="subtitle">获取您所在位置、此时此刻头顶正上方（天顶）的天体信息</p>
        
        <button id="locateBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M12 2v2"></path>
                <path d="M12 20v2"></path>
                <path d="M2 12h2"></path>
                <path d="M20 12h2"></path>
                <circle cx="12" cy="12" r="4"></circle>
            </svg>
            扫描头顶天空
        </button>
        
        <div class="loader" id="loader"></div>
        <div class="error-msg" id="errorMsg"></div>

        <div class="result-card" id="resultCard">
            <div class="result-item">
                <div class="result-label">天体名称 (Name)</div>
                <div class="result-value" id="resName">-</div>
            </div>
            <div class="result-item">
                <div class="result-label">天体类型 (Type)</div>
                <div class="result-value" id="resType">-</div>
            </div>
            <div class="result-item">
                <div class="result-label">距离地球 (Distance)</div>
                <div class="result-value" id="resDist">-</div>
            </div>
            <div class="result-item">
                <div class="result-label">天球坐标 (RA / Dec)</div>
                <div class="result-value" style="font-size: 14px; color: var(--text-muted);" id="resCoord">-</div>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('locateBtn');
        const loader = document.getElementById('loader');
        const errorMsg = document.getElementById('errorMsg');
        const resultCard = document.getElementById('resultCard');
        
        const resName = document.getElementById('resName');
        const resType = document.getElementById('resType');
        const resDist = document.getElementById('resDist');
        const resCoord = document.getElementById('resCoord');

        btn.addEventListener('click', () => {
            // Reset state
            errorMsg.style.display = 'none';
            resultCard.style.display = 'none';
            
            if (!navigator.geolocation) {
                showError("您的浏览器不支持地理位置功能。");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '正在获取地理位置...';
            loader.style.display = 'block';

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    fetchCelestialObject(lat, lon);
                },
                (error) => {
                    btn.disabled = false;
                    btn.innerHTML = '扫描头顶天空';
                    loader.style.display = 'none';
                    showError("无法获取位置，请确保允许浏览器获取定位权限。");
                }
            );
        });

        async function fetchCelestialObject(lat, lon) {
            btn.innerHTML = '正在查询 SIMBAD 数据库...';
            try {
                const response = await fetch('http://127.0.0.1:5001/find_star', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ latitude: lat, longitude: lon })
                });

                const data = await response.json();

                if (response.ok) {
                    resName.textContent = data.name;
                    resType.textContent = data.type;
                    resDist.textContent = data.distance;
                    resCoord.textContent = `${data.ra} / ${data.dec}`;
                    
                    resultCard.style.display = 'block';
                } else {
                    showError(data.error || "发生了未知错误。");
                }
            } catch (err) {
                showError("无法连接到后端服务器，请确保 app.py 已运行。");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '重新扫描头顶天空';
                loader.style.display = 'none';
            }
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }
    </script>
</body>
</html>
